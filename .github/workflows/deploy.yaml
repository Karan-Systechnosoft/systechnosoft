name: Deploy to GitHub Pages

on:
  push:
    branches: [main] # Runs every time you push to main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install and Build
        run: |
          npm install
          npm run build
        env:
          # THIS IS THE KEY PART:
          # It grabs the variable from GitHub and gives it to your build tool
          VITE_API_URL: ${{ secrets.VITE_BACKEND_URL }} 
          # Use ${{ secrets.NAME }} if you put it in the Secrets tab

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # Change to 'build' if using Create React App
          branch: gh-pages # The branch where the static files go
